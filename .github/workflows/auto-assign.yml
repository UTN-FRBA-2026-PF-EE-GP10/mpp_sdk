name: Auto-assign PR

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  assign:
    name: Assign PR to author
    runs-on: ubuntu-latest
    steps:
      - name: Add author as assignee
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            // Skip bot authors — GitHub rejects those as assignees.
            if (pr.user.type === "Bot") {
              core.info(`Skipping bot author: ${author}`);
              return;
            }
            // Skip if the author is already assigned (e.g., on reopen).
            const already = (pr.assignees || []).some(a => a.login === author);
            if (already) {
              core.info(`${author} is already assigned`);
              return;
            }
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                assignees: [author],
              });
              core.info(`Assigned PR #${pr.number} to ${author}`);
            } catch (err) {
              // GitHub rejects non-collaborator assignees on private repos and
              // for some external contributors. Don't fail the workflow over it.
              core.warning(`Could not assign ${author}: ${err.message}`);
            }
