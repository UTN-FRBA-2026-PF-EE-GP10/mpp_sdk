name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync dev deps
        run: uv sync --group dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Tests (Python from .python-version)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Sync project + dev deps
        run: uv sync --group dev
      - name: Smoke import
        run: uv run python -c "import mpp_sdk; print(mpp_sdk.__version__)"
      - name: Run pytest
        env:
          MPLBACKEND: Agg
        run: uv run pytest -v --tb=short
